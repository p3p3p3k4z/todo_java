<div class="board-container">
  <div class="board-header">
    <h2>My Tasks</h2>
    <div class="board-controls">
      <select [formControl]="statusFilter" class="filter-select">
        <option value="">All Statuses</option>
        <option [value]="TaskStatus.PENDIENTE">Pendiente</option>
        <option [value]="TaskStatus.EN_PROGRESO">En Progreso</option>
        <option [value]="TaskStatus.COMPLETADA">Completada</option>
      </select>
      
      <button class="btn-primary" (click)="openNewTaskForm()" *ngIf="activeOverlay === 'NONE'" style="display: flex; align-items: center; gap: 0.4rem;">
        <lucide-icon [img]="PlusIcon" [size]="18"></lucide-icon> New Task
      </button>
    </div>
  </div>

  <app-error-banner [message]="errorMessage"></app-error-banner>
  <app-spinner *ngIf="isLoading"></app-spinner>

  <div *ngIf="activeOverlay === 'TASK_FORM'" class="form-wrapper fade-in">
    <app-task-form 
      [taskToEdit]="taskToEdit"
      (save)="onFormSave($event)"
      (cancel)="closeForm()">
    </app-task-form>
  </div>

  <ng-container *ngIf="!isLoading && activeOverlay === 'NONE'" [ngSwitch]="activeView">
      
      <!-- List View -->
      <app-task-list 
        *ngSwitchCase="'list'"
        [tasks]="filteredTasks" 
        (editTask)="openEditForm($event)"
        (deleteTask)="deleteTask($event)"
        (updateStatus)="updateTaskStatus($event)">
      </app-task-list>

      <!-- Sticky Board View -->
      <app-sticky-board 
        *ngSwitchCase="'sticky'"
        [tasks]="filteredTasks"
        (editTask)="openEditForm($event)"
        (updateStatus)="updateTaskStatus($event)">
      </app-sticky-board>

      <!-- Diagram View -->
      <app-diagram-view 
        *ngSwitchCase="'diagram'"
        [tasks]="filteredTasks">
      </app-diagram-view>

      <!-- Kanban View -->
      <app-kanban-board 
        *ngSwitchCase="'kanban'"
        [tasks]="filteredTasks"
        (updateStatus)="updateTaskStatus($event)"
        (editTask)="openEditForm($event)"
        (deleteTask)="deleteTask($event)">
      </app-kanban-board>

      <!-- Calendar View -->
      <app-calendar-board 
        *ngSwitchCase="'calendar'"
        [tasks]="filteredTasks"
        (editTask)="openEditForm($event)">
      </app-calendar-board>

    </ng-container>
</div>
