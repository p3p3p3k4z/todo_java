<div class="board-container">
  <div class="board-header">
    <h2>My Tasks</h2>
    <div class="board-controls">
      <select [formControl]="statusFilter" class="filter-select">
        <option value="">All Statuses</option>
        <option [value]="TaskStatus.PENDIENTE">Pendiente</option>
        <option [value]="TaskStatus.EN_PROGRESO">En Progreso</option>
        <option [value]="TaskStatus.COMPLETADA">Completada</option>
      </select>
      
      <button class="btn-toggle" (click)="toggleViewMode()">
        {{ isBoardMode ? '📋 List View' : '🗂️ Board View' }}
      </button>
      
      <button class="btn-primary" (click)="openNewTaskForm()" *ngIf="!showForm">
        + New Task
      </button>
    </div>
  </div>

  <app-error-banner [message]="errorMessage"></app-error-banner>
  <app-spinner *ngIf="isLoading"></app-spinner>

  <div *ngIf="showForm" class="form-wrapper fade-in">
    <app-task-form 
      [taskToEdit]="taskToEdit"
      (save)="saveTask($event)"
      (cancel)="closeForm()">
    </app-task-form>
  </div>

  <ng-container *ngIf="!isLoading && !showForm">
    
    <!-- List View -->
    <div class="list-view fade-in" *ngIf="!isBoardMode">
      <app-task-list 
        [tasks]="filteredTasks"
        (editTask)="openEditForm($event)"
        (deleteTask)="deleteTask($event)"
        (updateStatus)="updateTaskStatus($event)">
      </app-task-list>
    </div>

    <!-- Board View -->
    <div class="board-view fade-in" *ngIf="isBoardMode">
      
      <div class="board-column column-pendiente">
        <h3 class="column-title">Pendiente</h3>
        <div class="column-content">
          <app-task-card 
            *ngFor="let task of getTasksByStatus(TaskStatus.PENDIENTE)"
            [task]="task"
            [isBoardMode]="true"
            (edit)="openEditForm($event)"
            (delete)="deleteTask($event)"
            (statusChange)="updateTaskStatus($event)">
          </app-task-card>
        </div>
      </div>

      <div class="board-column column-progreso">
        <h3 class="column-title">En Progreso</h3>
        <div class="column-content">
          <app-task-card 
            *ngFor="let task of getTasksByStatus(TaskStatus.EN_PROGRESO)"
            [task]="task"
            [isBoardMode]="true"
            (edit)="openEditForm($event)"
            (delete)="deleteTask($event)"
            (statusChange)="updateTaskStatus($event)">
          </app-task-card>
        </div>
      </div>

      <div class="board-column column-completada">
        <h3 class="column-title">Completada</h3>
        <div class="column-content">
          <app-task-card 
            *ngFor="let task of getTasksByStatus(TaskStatus.COMPLETADA)"
            [task]="task"
            [isBoardMode]="true"
            (edit)="openEditForm($event)"
            (delete)="deleteTask($event)"
            (statusChange)="updateTaskStatus($event)">
          </app-task-card>
        </div>
      </div>

    </div>
  </ng-container>
</div>
