<div class="auth-container">
  
  <!-- Lado de la marca (Branding) -->
  <div class="auth-banner">
    <lucide-icon [img]="LogoIcon" [size]="80" class="brand-icon"></lucide-icon>
    <h1 class="brand-title">todo-java</h1>
    <p class="brand-subtitle">Gestiona tu equipo. Organiza tu trabajo. Completa tus objetivos.</p>
  </div>

  <!-- Lado del formulario -->
  <div class="auth-form-section">
    <div class="auth-card">
      <h2>Iniciar Sesión</h2>
      
      <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" formControlName="email" placeholder="nombre@empresa.com" />
          <div class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">El correo es requerido.</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Formato de correo inválido.</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" formControlName="password" placeholder="••••••••" />
          <div class="error-text" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es requerida.</span>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading" class="btn-primary">
          <span *ngIf="isLoading">Cargando...</span>
          <span *ngIf="!isLoading">Entrar a mi tablero</span>
        </button>
      </form>

      <div class="auth-links">
        <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
</div>
